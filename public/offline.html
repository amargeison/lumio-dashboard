<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lumio — Offline</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #07080F;
      color: #E5E7EB;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: #0d1117; border: 1px solid #1F2937; border-radius: 16px;
      padding: 28px; text-align: center;
    }
    .icon { font-size: 44px; line-height: 1; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 800; margin: 0 0 8px; color: #fff; }
    p { font-size: 14px; line-height: 1.5; color: #9CA3AF; margin: 0 0 18px; }
    button {
      background: #0EA5E9; color: #fff; border: 0; border-radius: 12px;
      padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .hint { margin-top: 14px; font-size: 11px; color: #4B5563; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You&rsquo;re offline</h1>
    <p>Last cached portal data will load when you&rsquo;re back online. Briefings and recently-viewed pages stay available; live data resumes once connectivity returns.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="hint">Lumio Sports · Offline mode</div>
  </div>
</body>
</html>
