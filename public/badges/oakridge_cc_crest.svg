<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Oakridge CC crest">
  <!-- Outer shield (thicker yellow border) -->
  <path d="M 2 2 H 198 V 132 C 198 178 152 214 100 238 C 48 214 2 178 2 132 Z" fill="#F1C40F"/>
  <!-- Inner shield field (blue) -->
  <path d="M 11 11 H 189 V 130 C 189 172 148 204 100 226 C 52 204 11 172 11 130 Z" fill="#003DA5"/>
  <!-- Top band (taller yellow) ~22% of shield height -->
  <path d="M 11 11 H 189 V 63 H 11 Z" fill="#F1C40F"/>
  <!-- Thin blue divider under top band -->
  <rect x="11" y="63" width="178" height="2" fill="#003DA5"/>
  <!-- Club name -->
  <text x="100" y="48" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="900" fill="#003DA5" text-anchor="middle" letter-spacing="0.15em">OAKRIDGE</text>
  <!-- Oak leaf silhouette (shared motif with the FC crest) -->
  <path d="M 100 68 C 108 67 118 76 118 82 C 118 90 118 92 112 93 C 118 96 138 94 138 100 C 138 106 131 112 125 114 C 131 116 156 113 156 119 C 156 125 136 140 130 142 C 136 144 142 149 142 155 C 142 161 116 168 110 170 C 108 174 104 175 103 178 L 100 185 L 97 178 C 96 175 92 174 90 170 C 84 168 58 161 58 155 C 58 149 64 144 70 142 C 64 140 44 125 44 119 C 44 113 69 116 75 114 C 69 112 62 106 62 100 C 62 94 82 96 88 93 C 82 92 82 90 82 82 C 82 76 92 67 100 68 Z" fill="#F1C40F"/>
  <!-- Crossed cricket bats + ball (saltire behind the oak leaf) -->
  <g stroke="#003DA5" stroke-width="3" stroke-linecap="round">
    <!-- Bat 1 (top-left to bottom-right) — handle + blade -->
    <line x1="56" y1="86"  x2="144" y2="174" opacity="0.55"/>
    <!-- Bat 2 (top-right to bottom-left) -->
    <line x1="144" y1="86" x2="56"  y2="174" opacity="0.55"/>
  </g>
  <!-- Cricket bat handles (subtle darker tape at top ends of the saltire) -->
  <g fill="#003DA5" opacity="0.7">
    <circle cx="56"  cy="86"  r="3"/>
    <circle cx="144" cy="86"  r="3"/>
  </g>
  <!-- Cricket ball — dead-centre at leaf tip -->
  <g>
    <circle cx="100" cy="188" r="6" fill="#B91C1C" stroke="#F1C40F" stroke-width="1.5"/>
    <path d="M 94 188 Q 100 184 106 188" fill="none" stroke="#F1C40F" stroke-width="0.8"/>
    <path d="M 94 188 Q 100 192 106 188" fill="none" stroke="#F1C40F" stroke-width="0.8"/>
  </g>
  <!-- Bottom text -->
  <text x="100" y="215" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="700" fill="#F1C40F" text-anchor="middle" letter-spacing="1.2">CC · EST. 1887</text>
</svg>
