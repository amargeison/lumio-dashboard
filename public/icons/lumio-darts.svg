<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Lumio Darts crest">
  <defs>
    <linearGradient id="ldShield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>
  <path d="M 100 8 L 180 26 L 180 108 C 180 150 148 178 100 192 C 52 178 20 150 20 108 L 20 26 Z"
        fill="url(#ldShield)" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 100 18 L 172 33 L 172 108 C 172 144 144 170 100 183 C 56 170 28 144 28 108 L 28 33 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- Dartboard rings centered at (100, 88) -->
  <g transform="translate(100,88)">
    <!-- Outer double ring -->
    <circle cx="0" cy="0" r="42" fill="#0a0a0a" stroke="#fbbf24" stroke-width="2"/>
    <!-- Alternating segments approximated with simple wedges -->
    <g>
      <path d="M 0 0 L 42 0 A 42 42 0 0 1 29.7 29.7 Z" fill="#dc2626"/>
      <path d="M 0 0 L 29.7 29.7 A 42 42 0 0 1 -29.7 29.7 Z" fill="#0a0a0a"/>
      <path d="M 0 0 L -29.7 29.7 A 42 42 0 0 1 -42 0 Z" fill="#dc2626"/>
      <path d="M 0 0 L -42 0 A 42 42 0 0 1 -29.7 -29.7 Z" fill="#0a0a0a"/>
      <path d="M 0 0 L -29.7 -29.7 A 42 42 0 0 1 29.7 -29.7 Z" fill="#dc2626"/>
      <path d="M 0 0 L 29.7 -29.7 A 42 42 0 0 1 42 0 Z" fill="#0a0a0a"/>
    </g>
    <!-- Inner triple ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Bullseye outer -->
    <circle cx="0" cy="0" r="9" fill="#22c55e" stroke="#14532d" stroke-width="1"/>
    <!-- Bullseye inner -->
    <circle cx="0" cy="0" r="4" fill="#dc2626" stroke="#7f1d1d" stroke-width="0.8"/>
    <!-- Dart shaft + flight (lodged top-right of bullseye) -->
    <g transform="rotate(-30)">
      <rect x="-1.2" y="-50" width="2.4" height="48" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.4"/>
      <path d="M -6 -52 L 6 -52 L 0 -36 Z" fill="#fbbf24" stroke="#92400e" stroke-width="0.6"/>
      <path d="M -2 -2 L 2 -2 L 0 4 Z" fill="#374151"/>
    </g>
  </g>
  <!-- Name band -->
  <rect x="20" y="138" width="160" height="22" fill="#ffffff"/>
  <text x="100" y="153" text-anchor="middle"
        font-family="DM Sans, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="800" letter-spacing="2"
        fill="#7f1d1d">LUMIO DARTS</text>
  <text x="100" y="175" text-anchor="middle"
        font-family="DM Sans, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" letter-spacing="3"
        fill="#ffffff" fill-opacity="0.85">EST. 2026</text>
</svg>
